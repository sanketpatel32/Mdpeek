<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdpeek</title>
    <link rel="stylesheet" href="/src/styles/themes.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/content.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css"
      id="hljs-light"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
      id="hljs-dark"
      disabled
    />
  </head>
  <body>
    <header class="toolbar">
      <button id="btn-open" title="Open (Ctrl+O)">Open</button>
      <button id="btn-save" title="Save (Ctrl+S)">Save</button>
      <span class="spacer"></span>
      <button id="btn-mode" title="Toggle edit (Ctrl+E)">View</button>
      <button id="btn-theme" title="Toggle theme">☾</button>
      <span id="file-name" class="file-name">No file</span>
    </header>

    <main id="view-mode" class="view-mode">
      <aside id="toc" class="toc"></aside>
      <article id="document" class="markdown-body"></article>
    </main>

    <main id="edit-mode" class="edit-mode hidden">
      <textarea id="editor" class="editor" spellcheck="false"></textarea>
      <article id="preview" class="markdown-body"></article>
    </main>

    <div id="dropzone" class="dropzone hidden">Drop a .md file to open</div>
    <div id="toast" class="toast hidden"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
