<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdpeek</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="stylesheet" href="/src/styles/themes.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/content.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css"
      id="hljs-light"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
      id="hljs-dark"
      disabled
    />
  </head>
  <body>
    <header class="app-header">
      <div id="tab-strip" class="tab-strip"></div>

      <span class="header-spacer"></span>

      <div class="toolbar">
        <button id="btn-open" class="tool-btn icon-only" title="Open file (Ctrl+O)" aria-label="Open file">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button id="btn-save" class="tool-btn icon-only" title="Save file (Ctrl+S)" aria-label="Save file">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
        <button id="btn-mode" class="tool-btn icon-only" title="Toggle edit/view (Ctrl+E)" aria-label="Toggle edit mode">
          <svg id="icon-mode" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        </button>
        <button id="btn-sidebar" class="tool-btn icon-only active" title="Toggle sidebar (Ctrl+B)" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>
        <button id="btn-zoom-out" class="tool-btn icon-only" title="Zoom out (Ctrl+-)" aria-label="Zoom out">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button id="btn-zoom-in" class="tool-btn icon-only" title="Zoom in (Ctrl+=)" aria-label="Zoom in">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button id="btn-update" class="tool-btn update-btn" title="Checking for updates…" aria-label="Check for updates">
          <span class="update-dot" aria-hidden="true"></span>
          <span class="update-label">v—</span>
        </button>
        <button id="btn-theme" class="tool-btn icon-only" title="Toggle theme" aria-label="Toggle light/dark theme">
          <svg id="icon-theme" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <main id="view-mode" class="view-mode">
      <aside id="toc" class="toc" aria-label="Table of contents"></aside>
      <article id="document" class="markdown-body"></article>
    </main>

    <main id="edit-mode" class="edit-mode hidden">
      <div class="editor-pane">
        <div class="pane-header">Source</div>
        <div id="find-bar" class="find-bar hidden">
          <input type="text" class="find-input" placeholder="Find…" spellcheck="false" />
          <span class="find-count">0/0</span>
          <button class="find-prev tool-btn icon-only" title="Previous (Shift+Enter)" aria-label="Previous match">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button class="find-next tool-btn icon-only" title="Next (Enter)" aria-label="Next match">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button class="find-close tool-btn icon-only" title="Close (Esc)" aria-label="Close find bar">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="editor-wrap">
          <div id="gutter" class="gutter" aria-hidden="true"></div>
          <textarea id="editor" class="editor" spellcheck="false" placeholder="Type markdown here..."></textarea>
        </div>
      </div>
      <div class="preview-pane">
        <div class="pane-header">Preview</div>
        <article id="preview" class="markdown-body"></article>
      </div>
    </main>

    <div id="dropzone" class="dropzone hidden">
      <div class="dropzone-inner">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>Drop a <code>.md</code> file to open</p>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div id="ctx-menu" class="ctx-menu hidden" role="menu">
      <button class="ctx-item" data-action="close" role="menuitem">Close</button>
      <button class="ctx-item" data-action="close-others" role="menuitem">Close others</button>
      <button class="ctx-item" data-action="close-right" role="menuitem">Close to the right</button>
      <div class="ctx-sep"></div>
      <button class="ctx-item" data-action="close-all" role="menuitem">Close all</button>
    </div>

    <div id="close-dialog" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="close-dialog-title">
      <div class="modal">
        <h2 id="close-dialog-title" class="modal-title">Close mdpeek</h2>
        <p class="modal-text">Minimize to the system tray and keep running in the background, or quit completely?</p>
        <label class="modal-remember">
          <input type="checkbox" id="close-remember" />
          <span>Always do this (don't ask again)</span>
        </label>
        <div class="modal-actions">
          <button id="close-cancel" class="modal-btn modal-btn-secondary">Cancel</button>
          <button id="close-quit" class="modal-btn modal-btn-secondary">Quit</button>
          <button id="close-minimize" class="modal-btn modal-btn-primary">Minimize to tray</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
