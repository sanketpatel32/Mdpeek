<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="50%" stop-color="#070a14"/>
      <stop offset="100%" stop-color="#03050a"/>
    </linearGradient>

    <!-- Facet Gradients for 3D Isometric Depth -->
    <linearGradient id="facet-blue-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <linearGradient id="facet-blue-mid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <linearGradient id="facet-blue-deep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="facet-cyan-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <linearGradient id="facet-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Ambient Shadow for Isometric Pop -->
    <filter id="ribbon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#0284c7" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Squircle Base Tile -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg-grad)"/>
  
  <!-- Outer Subtle Glass Edge Stroke -->
  <rect x="32" y="32" width="960" height="960" rx="188" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="4"/>

  <!-- Penrose Origami Ribbon (M + P Monogram) -->
  <g transform="translate(512 516)" filter="url(#ribbon-shadow)">
    <!-- Facet 1: Left Vertical Stem (Left leg of M) -->
    <polygon points="-280,140 -280,-140 -120,-220 0,-140 0,140 -120,60" fill="url(#facet-blue-light)"/>
    
    <!-- Facet 2: Top Right Loop (Forming P loop & right peak of M) -->
    <polygon points="0,-140 160,-220 280,-140 280,20 160,100 0,20" fill="url(#facet-cyan-highlight)"/>
    
    <!-- Negative Space Center Cutout for P Loop -->
    <polygon points="60,-80 160,-130 220,-80 220,0 160,40 60,-10" fill="#070a14"/>

    <!-- Facet 3: Right Vertical Fold (Right leg of M) -->
    <polygon points="0,20 160,100 160,260 0,180" fill="url(#facet-blue-mid)"/>

    <!-- Facet 4: Bottom Connecting Base Fold -->
    <polygon points="-280,140 0,180 0,260 -280,220" fill="url(#facet-dark)"/>
    
    <!-- Facet 5: Top Apex Highlight Plane -->
    <polygon points="-120,-220 0,-140 160,-220 40,-300" fill="#bae6fd"/>

    <!-- Facet 6: Deep Interior Shadow Plane -->
    <polygon points="-120,60 0,-140 0,140" fill="url(#facet-blue-deep)" opacity="0.6"/>
  </g>
</svg>
